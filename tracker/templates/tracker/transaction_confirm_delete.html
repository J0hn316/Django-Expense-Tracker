{% extends "base.html" %}

{% block title %}
  Delete Transaction | Expense Tracker
{% endblock %}

{% block content %}
  <h1>Delete Transaction</h1>

  <p>
    Are you sure you want to delete
    <strong>{{ transaction.description }} - ${{ transaction.amount }}</strong>?
  </p>

  <form method="post">
    {% csrf_token %}

    <button type="submit">Yes, Delete</button>
    <a href="{% url 'tracker:transaction_detail' transaction.pk %}">Cancel</a>
  </form>
{% endblock %}
