{% extends "base.html" %}

{% block title %}
  Delete Category | Expense Tracker
{% endblock %}

{% block content %}
  <h1>Delete Category</h1>

  <p>
    Are you sure you want to delete
    <strong>{{ category.name }} ({{ category.get_category_type_display }})</strong>?
  </p>

  <form method="post">
    {% csrf_token %}

    <button type="submit">Yes, Delete</button>
    <a href="{% url 'tracker:category_list' %}">Cancel</a>
  </form>
{% endblock %}
