{% extends "base.html" %}

{% block title %}
  {{ page_title }} | Expense Tracker
{% endblock %}

{% block content %}
  <section class="card form-card">
    <h1>{{ page_title }}</h1>

    <form method="post">
      {% csrf_token %}

      {{ form.as_p }}

      <div class="actions">
        <button class="button" type="submit">
          {{ button_text }}
        </button>

        <a
          class="button button-secondary"
          href="{% url 'tracker:transaction_list' %}"
        >
          Cancel
        </a>
      </div>
    </form>
  </section>
{% endblock %}
