{% extends "base.html" %}

{% block title %}
  {{ page_title }} | Expense Tracker
{% endblock %}

{% block content %}
  <h1>{{ page_title }}</h1>

  <form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">{{ button_text }}</button>
  </form>

  <p>
    <a href="{% url 'tracker:category_list' %}">Back to Categories</a>
  </p>
{% endblock %}
