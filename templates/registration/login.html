{% extends "base.html" %}

{% block title %}
  Log In | Expense Tracker
{% endblock %}

{% block content %}
  <section class="card auth-card">
    <h1>Log In</h1>

    <p class="page-subtitle">
      Access your personal financial dashboard.
    </p>

    <form method="post">
      {% csrf_token %}

      {{ form.as_p }}

      {% if next %}
        <input type="hidden" name="next" value="{{ next }}" />
      {% endif %}

      <button class="button" type="submit">
        Log In
      </button>
    </form>

    <p>
      Need an account?
      <a href="{% url 'tracker:register' %}">Register</a>
    </p>
  </section>
{% endblock %}
