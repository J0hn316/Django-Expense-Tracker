{% extends "base.html" %}

{% block title %}
  Login | Expense Tracker
{% endblock %}

{% block content %}
  <h1>Log In</h1>

  <form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">Log In</button>
  </form>

  <p>
    Need an account?
    <a href="{% url 'tracker:register' %}">Register</a>
  </p>
{% endblock %}
