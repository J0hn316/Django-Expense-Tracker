<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
      {% block title %}
        Expense Tracker
      {% endblock %}
    </title>
  </head>

  <body>
    <header>
      <nav>
        <a href="{% url 'tracker:home' %}">Expense Tracker</a>

        {% if request.user.is_authenticated %}
          <a href="{% url 'tracker:dashboard' %}">Dashboard</a>
          <a href="{% url 'tracker:category_list' %}">Categories</a>
          <a href="{% url 'tracker:transaction_list' %}">Transactions</a>

          <form method="post" action="{% url 'logout' %}" style="display: inline">
            {% csrf_token %}
            <button type="submit">Log Out</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}">Log In</a>
          <a href="{% url 'tracker:register' %}">Register</a>
        {% endif %}
      </nav>
    </header>

    {% if messages %}
      <section>
        {% for message in messages %}
          <p>{{ message }}</p>
        {% endfor %}
      </section>
    {% endif %}

    <main>
      {% block content %}
      {% endblock %}
    </main>
  </body>
</html>
